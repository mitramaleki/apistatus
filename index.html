<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>URL Status Checker</title>
<style>
body{font-family:Arial,sans-serif;max-width:600px;margin:40px auto;padding:20px;background:#f9f9f9}
h1{text-align:center;color:#333}
textarea{width:100%;height:150px;padding:10px;font-family:monospace;border:1px solid #ccc;border-radius:4px;resize:vertical}
button{display:block;width:100%;padding:12px;background:#007bff;color:#fff;border:none;border-radius:4px;font-size:16px;cursor:pointer;margin-top:10px}
button:hover{background:#0056b3}
button:disabled{background:#ccc;cursor:not-allowed}
#progress{margin:15px 0;text-align:center;color:#666;min-height:20px}
#results{margin-top:20px}
table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{padding:12px;text-align:left;border-bottom:1px solid #ddd}
th{background:#f8f9fa}
.status-active{color:#28a745;font-weight:bold}
.status-non-active{color:#dc3545;font-weight:bold}
.details{font-family:monospace;font-size:0.9em;color:#555}
.empty{text-align:center;padding:20px;color:#777}
.download{display:inline-block;margin-top:15px;padding:10px 20px;background:#28a745;color:#fff;text-decoration:none;border-radius:4px}
.download:hover{background:#218838}
</style>
</head>
<body>
<h1>URL Status Checker</h1>
<p>Enter URLs (one per line) to see if they're active (any HTTP response) or nonâ€‘active.</p>
<textarea id="urlInput" placeholder="example.com&#10;google.com&#10;github.com"></textarea>
<button id="checkBtn">CheckBtn>Check URLs</button>
<div id="progress"></div>
<div id="results"></div>

<script>
document.getElementById('checkBtn').addEventListener('click', checkUrls);

async function checkUrls() {
const ta=document.getElementById('urlInput');
const prog=document.getElementById('progress');
const res=document.getElementById('results');
const btn=document.getElementById('checkBtn');

const text=ta.value.trim();
if(!text){alert('Please enter at least one URL');return;}
const urls=text.split('\n').map(l=>l.trim()).filter(l=>l.length);
const total=urls.length;

btn.disabled=true;
prog.textContent='Starting check...';
res.innerHTML='';

const results=[];
let active=0;

for(let i=0;i<urls.length;i++){
const url=urls[i];
prog.textContent=`[${i+1}/${total}] Checking: ${url}`;
try{
const {statusLabel,statusInfo}=await checkUrl(url);
results.push({url,statusLabel,statusInfo});
if(statusLabel==='Active')active++;
}catch(err){
results.push({url,statusLabel:'Non-active',statusInfo:err.message||'Unknown error'});
}
if(i<urls.length-1){await new Promise(r=>setTimeout(r,300));}
}

btn.disabled=false;
prog.textContent=`Check complete! ${active} active / ${total} total.`;

if(results.length===0){
res.innerHTML='<div class="empty">No results to display.</div>';
return;
}

res.innerHTML=`
<h2>Results</h2>
<table>
<thead><tr><th>URL</th><th>Status</th><th>Details</th></tr></thead>
<tbody>
${results.map(r=>`
<tr>
<td>${r.url}</td>
<td class="status-${r.statusLabel.toLowerCase().replace(/\//g,'-')}">${r.statusLabel}</td>
<td class="details">${r.statusInfo}</td>
</tr>
`).join('')}
</tbody>
</table>
`;

// CSV download
const csvBlob=new Blob([resultsToCSV(results)],{type:'text/csv;charset=utf-8;'});
const csvUrl=URL.createObjectURL(csvBlob);
const dl=document.createElement('a');
dl.href=csvUrl;
dl.download=`url_status_${new Date().toISOString().slice(0,10)}.csv`;
dl.className='download';
dl.textContent='Download CSV';
res.appendChild(dl);
}

async function checkUrl(url){
// Ensure scheme
if(!/^https?:\/\//i.test(url))url='http://'+url;

// CORS proxy
const proxy='https://api.allorigins.win/raw?url='+encodeURIComponent(url);

// Timeout controller
const controller=new AbortController();
const timeout=setTimeout(()=>controller.abort(),8000);
try{
const response=await fetch(proxy,{signal:controller.signal});
clearTimeout(timeout);
// Any HTTP response => Active
return {statusLabel:'Active',statusInfo:response.status.toString()};
}catch(err){
clearTimeout(timeout);
if(err.name==='AbortError'){
return {statusLabel:'Non-active',statusInfo:'Request timed out (8s)'};
}
return {statusLabel:'Non-active',statusInfo:err.message||'Unknown error'};
}
}

function resultsToCSV(results){
let csv='URL,Status,Details\n';
for(const r of results){
const esc=s=>String(s).replace(/"/g,'""').replace(/,/g,',').replace(/\n/g,' ');
csv+=`"${esc(r.url)}","${esc(r.statusLabel)}","${esc(r.statusInfo)}"\n`;
}
return csv;
}
</script>
</body>
