<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URL Status Checker</title>
  <style>
    :root {
      --pink-soft: #ffd6e7;
      --pink-medium: #ff85b3;
      --pink-dark: #e75480;
      --text-dark: #5a3a4a;
      --text-light: #fff;
      --shadow: rgba(0, 0, 0, 0.05);
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 20px;
      background: linear-gradient(135deg, #ffe6f2 0%, #ffcce6 100%);
      color: var(--text-dark);
      min-height: 100vh;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 30px;
    }

    h1 {
      font-size: 2.5rem;
      color: var(--pink-dark);
      margin: 0;
      text-shadow: 1px 1px 2px var(--shadow);
    }

    .subtitle {
      font-size: 1.1rem;
      color: var(--pink-medium);
      margin-top: 5px;
    }

    textarea {
      width: 100%;
      height: 120px;
      padding: 12px;
      border: 1px solid rgba(255, 133, 179, 0.3);
      border-radius: 8px;
      font-family: inherit;
      font-size: 1rem;
      background: rgba(255, 255, 255, 0.8);
      resize: vertical;
    }

    textarea:focus {
      outline: none;
      border-color: var(--pink-medium);
      box-shadow: 0 0 0 2px rgba(255, 133, 179, 0.2);
    }

    button {
      margin: 10px 0;
      padding: 10px 20px;
      background: var(--pink-medium);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    button:hover:not(:disabled) {
      background: var(--pink-dark);
      transform: translateY(-1px);
    }

    button:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
    }

    .summary {
      background: rgba(255, 255, 255, 0.8);
      padding: 15px 20px;
      border-radius: 12px;
      margin: 20px 0;
      text-align: center;
      font-size: 1.1rem;
      color: var(--pink-dark);
      box-shadow: 0 2px 8px var(--shadow);
      border: 1px solid rgba(255, 133, 179, 0.2);
    }

    .table-wrapper {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 12px var(--shadow);
      border: 1px solid rgba(255, 133, 179, 0.2);
      margin-top: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      background: var(--pink-soft);
      color: var(--pink-dark);
      padding: 16px 12px;
      text-align: left;
      font-weight: 600;
      border-bottom: 2px solid var(--pink-medium);
    }

    td {
      padding: 14px 12px;
      border-bottom: 1px solid rgba(255, 133, 179, 0.2);
    }

    tr:last-child td {
      border-bottom: none;
    }

    tr:hover {
      background: rgba(255, 214, 231, 0.3);
    }

    .status-active {
      color: #4caf50;
      font-weight: 600;
    }

    .status-redirected {
      color: #ff9800;
      font-weight: 600;
    }

    .status-parked {
      color: #9c27b0;
      font-weight: 600;
    }

    .status-non-active {
      color: #f44336;
      font-weight: 600;
    }

    .redirect-url {
      font-size: 0.85em;
      color: var(--pink-medium);
      margin-top: 2px;
    }

    a {
      color: var(--pink-dark);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .loading {
      opacity: 0.7;
      pointer-events: none;
    }

    .pulse {
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.6; }
      100% { opacity: 1; }
    }

    footer {
      text-align: center;
      margin-top: 30px;
      font-size: 0.9rem;
      color: var(--pink-medium);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>URL Status Checker</h1>
      <div class="subtitle">Enter URLs (one per line) to check if they're active or non‑active 💖</div>
    </header>

    <textarea id="urlsInput" placeholder="http://example.com
https://another.example"></textarea><br>
    <button id="checkBtn">Check URLs</button>

    <div class="summary" id="summary"></div>

    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>URL</th>
            <th>Status</th>
            <th>Details</th>
          </tr>
        </thead>
        <tbody id="results">
          <!-- Results will be inserted here -->
        </tbody>
      </table>
    </div>

    <button id="exportBtn" style="display:none;">Download Results as CSV</button>

    <footer>
      Created by Mitra 🐤
    </footer>
  </div>

  <script>
    const proxyUrl = 'https://corsproxy.io/?';
    const timeoutMs = 10000;

    // Detect parking pages (e.g., huge domains)
    function isParkingPage(url) {
      return url.includes('hugedomains.com') ||
             url.includes('sedoparking.com') ||
             url.includes('parkingcrew.net') ||
             url.includes('domainsponsor.com');
      // Add more known parking domains if needed
    }

    // Check a single URL
    async function checkUrl(url) {
      const proxyFullUrl = proxyUrl + encodeURIComponent(url);

      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), timeoutMs);

      try {
        const response = await fetch(proxyFullUrl, {
          signal: controller.signal,
          redirect: 'follow'
        });
        clearTimeout(timeoutId);

        if (response.ok) {
          const finalUrl = response.url;
          let statusLabel = 'Active';
          let statusInfo = 'HTTP ' + response.status;

          // Detect redirect
          if (finalUrl && finalUrl !== url) {
            if (isParkingPage(finalUrl)) {
              statusLabel = 'Parked';
              statusInfo += ' | Redirected to parking page';
            } else {
              statusLabel = 'Redirected';
              statusInfo += ' | Redirected';
            }
          }

          return {
            url,
            finalUrl,
            statusLabel,
            statusInfo,
            ok: true
          };
        } else {
          return {
            url,
            statusLabel: 'Non-active',
            statusInfo: 'HTTP ' + response.status,
            ok: false
          };
        }
      } catch (error) {
        clearTimeout(timeoutId);
        return {
          url,
          statusLabel: 'Non-active',
          statusInfo: error.message,
          ok: false
        };
      }
    }

    // Check all URLs and update the table
    async function checkUrls() {
      const urlsInput = document.getElementById('urlsInput').value.trim();
      if (!urlsInput) return;

      const urls = urlsInput.split('\n').map(s => s.trim()).filter(Boolean);
      const resultsElem = document.getElementById('results');
      const summaryElem = document.getElementById('summary');
      const checkBtn = document.getElementById('checkBtn');
      const exportBtn = document.getElementById('exportBtn');

      resultsElem.innerHTML = '';
      summaryElem.textContent = 'Checking URLs...';
      checkBtn.disabled = true;
      exportBtn.style.display = 'none';
      document.body.classList.add('loading');
      summaryElem.classList.add('pulse');

      const promises = urls.map(url => checkUrl(url));
      const results = await Promise.allSettled(promises);

      const fulfilledResults = results
        .filter(r => r.status === 'fulfilled')
        .map(r => r.value);

      const total = fulfilledResults.length;

      // Update summary: just "X/X done"
      summaryElem.textContent = `${total}/${total} done`;

      // Render results
      resultsElem.innerHTML = fulfilledResults.map(r => `
        <tr>
          <td>
            <a href="${r.url}" target="_blank">${r.url}</a>
            ${r.finalUrl && r.finalUrl !== r.url ? `<div class="redirect-url">→ ${r.finalUrl}</div>` : ''}
          </td>
          <td class="status-${r.statusLabel.toLowerCase().replace('/', '-')}">${r.statusLabel}</td>
          <td>${r.statusInfo}</td>
        </tr>
      `).join('');

      // Enable CSV export
      exportBtn.style.display = 'inline-block';
      exportBtn.onclick = () => exportToCsv(fulfilledResults);

      checkBtn.disabled = false;
      document.body.classList.remove('loading');
      summaryElem.classList.remove('pulse');
    }

    // Export results as CSV
    function exportToCsv(results) {
      const headers = ['URL', 'Status', 'Details'];
      const csvContent = [
        headers.join(','),
        ...results.map(r => [
          `"${r.url.replace(/"/g, '""')}"`,
          `"${r.statusLabel}"`,
          `"${r.statusInfo.replace(/"/g, '""')}"`
        ].join(','))
      ].join('\n');

      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      const url = URL.createObjectURL(blob);
      link.setAttribute('href', url);
      link.setAttribute('download', 'url_status_results.csv');
      link.style.visibility = 'hidden';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    // Event listeners
    document.getElementById('checkBtn').addEventListener('click', checkUrls);
  </script>
</body>
</html>
