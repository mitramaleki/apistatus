<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Status Checker</title>
    <style>
        :root {
            --bg: #fafafa;
            --primary: #4a90e2;
            --primary-dark: #357ab8;
            --success: #7ed321;
            --danger: #d0021b;
            --text: #333;
            --muted: #777;
            --border: #ddd;
            --radius: 6px;
        }
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            margin: 0;
            padding: 2rem;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        h1 {
            text-align: center;
            color: var(--primary);
            margin-bottom: 0.5rem;
            font-weight: 600;
        }
        p {
            text-align: center;
            color: var(--muted);
            margin-bottom: 2rem;
        }
        textarea {
            width: 100%;
            min-height: 120px;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9rem;
            resize: vertical;
            background: white;
            transition: border-color 0.2s;
        }
        textarea:focus {
            outline: none;
            border-color: var(--primary);
        }
        .btn {
            display: block;
            width: 100%;
            padding: 0.75rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 1rem;
        }
        .btn:hover {
            background: var(--primary-dark);
        }
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        #progress {
            text-align: center;
            margin: 1.5rem 0;
            font-size: 0.9rem;
            color: var(--muted);
            min-height: 1.2rem;
        }
        #results {
            margin-top: 2rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }
        th, td {
            padding: 0.75rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        th {
            background: #f9f9f9;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }
        tr:hover {
            background: #fafafa;
        }
        .status-active {
            color: var(--success);
            font-weight: 600;
        }
        .status-non-active {
            color: var(--danger);
            font-weight: 600;
        }
        .details {
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.85rem;
            color: var(--muted);
        }
        .empty {
            text-align: center;
            padding: 2rem;
            color: var(--muted);
        }
        @media (max-width: 480px) {
            body { padding: 1rem; }
        }
    </style>
</head>
<body>
    <h1>URL Status Checker</h1>
    <p>Enter URLs (one per line) to see if they're active (any HTTP response) or non‑active.</p>
    <textarea id="urlInput" placeholder="example.com&#10;google.com&#10;github.com"></textarea>
    <button id="checkBtn" class="btn">Check URLs</button>
    <div id="progress"></div>
    <div id="results"></div>

    <script>
        document.getElementById('checkBtn').addEventListener('click', checkUrls);

        async function checkUrls() {
            const urlInput = document.getElementById('urlInput');
            const progressDiv = document.getElementById('progress');
            const resultsDiv = document.getElementById('results');
            const checkBtn = document.getElementById('checkBtn');

            const text = urlInput.value.trim();
            if (!text) {
                alert('Please enter at least one URL');
                return;
            }

            const urls = text.split('\n').map(l => l.trim()).filter(l => l.length);
            const total = urls.length;

            checkBtn.disabled = true;
            progressDiv.textContent = 'Starting check...';
            resultsDiv.innerHTML = '';

            const results = [];
            let activeCount = 0;

            for (let i = 0; i < urls.length; i++) {
                const url = urls[i];
                progressDiv.textContent = `[${i + 1}/${total}] Checking: ${url}`;

                try {
                    const { statusLabel, statusInfo } = await checkUrl(url);
                    results.push({ url, statusLabel, statusInfo });
                    if (statusLabel === 'Active') activeCount++;
                } catch (err) {
                    results.push({ url, statusLabel: 'Non-active', statusInfo: err.message || 'Unknown error' });
                }

                // be polite: small pause between requests
                if (i < urls.length - 1) {
                    await new Promise(r => setTimeout(r, 300));
                }
            }

            checkBtn.disabled = false;
            progressDiv.textContent = `Check complete! ${activeCount} active / ${urls.length} total.`;

            if (results.length === 0) {
                resultsDiv.innerHTML = '<div class="empty">No results to display.</div>';
                return;
            }

            resultsDiv.innerHTML = `
                <h2>Results</h2>
                <table>
                    <thead>
                        <tr><th>URL</th><th>Status</th><th>Details</th></tr>
                    </thead>
                    <tbody>
                        ${results.map(r => `
                            <tr>
                                <td>${r.url}</td>
                                <td class="status-${r.statusLabel.toLowerCase().replace(/\//g, '-')}">${r.statusLabel}</td>
                                <td class="details">${r.statusInfo}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;

            // CSV download link
            const csvBlob = new Blob([resultsToCSV(results)], {type: 'text/csv;charset=utf-8;'});
            const csvUrl  = URL.createObjectURL(csvBlob);
            const dlLink  = document.createElement('a');
            dlLink.href = csvUrl;
            dlLink.download = `url_status_${new Date().toISOString().slice(0,10)}.csv`;
            dlLink.style.display = 'inline-block';
            dlLink.style.marginTop = '1rem';
            dlLink.textContent = 'Download CSV';
            resultsDiv.appendChild(dlLink);
        }

        async function checkUrl(url) {
            // ensure scheme
            if (!/^https?:\/\//i.test(url)) url = 'http://' + url;

            // CORS proxy (free, no key needed)
            const proxy = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url);

            const controller = new AbortController();
            const timeoutId  = setTimeout(() => controller.abort(), 8000); // 8-second timeout

            try {
                const response = await fetch(proxy, {signal: controller.signal});
                clearTimeout(timeoutId);
                // any HTTP response (2xx,3xx,4xx,5xx) means the server responded -> Active
                return {statusLabel: 'Active', statusInfo: response.status.toString()};
            } catch (err) {
                clearTimeout(timeoutId);
                if (err.name === 'AbortError') {
                    return {statusLabel: 'Non-active', statusInfo: 'Request timed out (8s)'};
                }
                return {statusLabel: 'Non-active', statusInfo: err.message || 'Unknown error'};
            }
        }

        function resultsToCSV(results) {
            let csv = 'URL,Status,Details\n';
            for (const r of results) {
                const esc = s => String(s)
                    .replace(/"/g, '""')
                    .replace(/,/g, ',')   // commas stay as commas because we quote the field
                    .replace(/\n/g, ' ');
                csv += `"${esc(r.url)}","${esc(r.statusLabel)}","${esc(r.statusInfo)}"\n`;
            }
            return csv;
        }
    </script>
</body>
</html>
