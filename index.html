<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Same cute pink styles as before -->
</head>
<body>
  <div class="container">
    <!-- Same header, textarea, buttons, table, footer as before -->
  </div>

  <script>
    const proxyUrl = 'https://corsproxy.io/?';
    const timeoutMs = 10000;

    function isParkingPage(url) {
      return url.includes('hugedomains.com') ||
             url.includes('sedoparking.com') ||
             url.includes('parkingcrew.net') ||
             url.includes('domainsponsor.com');
    }

    async function checkUrl(url) {
      const proxyFullUrl = proxyUrl + encodeURIComponent(url);

      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), timeoutMs);

      try {
        const response = await fetch(proxyFullUrl, {
          signal: controller.signal,
          redirect: 'follow'
        });
        clearTimeout(timeoutId);

        if (response.ok) {
          const finalUrl = response.url;
          let statusLabel = 'Active';
          let statusInfo = 'HTTP ' + response.status;

          // Detect redirect (compare final URL with original URL, not proxy URL)
          if (finalUrl && finalUrl !== url) {
            if (isParkingPage(finalUrl)) {
              statusLabel = 'Parked';
              statusInfo += ' | Redirected to parking page';
            } else {
              statusLabel = 'Redirected';
              statusInfo += ' | Redirected';
            }
          }

          return {
            url,
            finalUrl,
            statusLabel,
            statusInfo,
            ok: true
          };
        } else {
          return {
            url,
            statusLabel: 'Non-active',
            statusInfo: 'HTTP ' + response.status,
            ok: false
          };
        }
      } catch (error) {
        clearTimeout(timeoutId);
        return {
          url,
          statusLabel: 'Non-active',
          statusInfo: error.message,
          ok: false
        };
      }
    }

    async function checkUrls() {
      const urlsInput = document.getElementById('urlsInput').value.trim();
      if (!urlsInput) return;

      const urls = urlsInput.split('\n').map(s => s.trim()).filter(Boolean);
      const resultsElem = document.getElementById('results');
      const summaryElem = document.getElementById('summary');
      const checkBtn = document.getElementById('checkBtn');
      const exportBtn = document.getElementById('exportBtn');

      resultsElem.innerHTML = '';
      summaryElem.textContent = 'Checking URLs...';
      checkBtn.disabled = true;
      exportBtn.style.display = 'none';
      document.body.classList.add('loading');
      summaryElem.classList.add('pulse');

      const promises = urls.map(url => checkUrl(url));
      const results = await Promise.allSettled(promises);

      const fulfilledResults = results
        .filter(r => r.status === 'fulfilled')
        .map(r => r.value);

      // Count statuses
      const activeCount = fulfilledResults.filter(r => r.statusLabel === 'Active').length;
      const redirectedCount = fulfilledResults.filter(r => r.statusLabel === 'Redirected').length;
      const parkedCount = fulfilledResults.filter(r => r.statusLabel === 'Parked').length;
      const nonActiveCount = fulfilledResults.filter(r => r.statusLabel === 'Non-active').length;

      // Update summary: show "X/Y done"
      const total = fulfilledResults.length;
      const doneCount = activeCount + redirectedCount + parkedCount + nonActiveCount;
      summaryElem.textContent = `${doneCount}/${total} done`;

      // Render results
      resultsElem.innerHTML = fulfilledResults.map(r => `
        <tr>
          <td>
            <a href="${r.url}" target="_blank">${r.url}</a>
            ${r.finalUrl && r.finalUrl !== r.url ? `<div class="redirect-url">→ ${r.finalUrl}</div>` : ''}
          </td>
          <td class="status-${r.statusLabel.toLowerCase().replace('/', '-')}">${r.statusLabel}</td>
          <td>${r.statusInfo}</td>
        </tr>
      `).join('');

      // Enable CSV export
      exportBtn.style.display = 'inline-block';
      exportBtn.onclick = () => exportToCsv(fulfilledResults);

      checkBtn.disabled = false;
      document.body.classList.remove('loading');
      summaryElem.classList.remove('pulse');
    }

    function exportToCsv(results) {
      const headers = ['URL', 'Status', 'Details'];
      const csvContent = [
        headers.join(','),
        ...results.map(r => [
          `"${r.url.replace(/"/g, '""')}"`,
          `"${r.statusLabel}"`,
          `"${r.statusInfo.replace(/"/g, '""')}"`
        ].join(','))
      ].join('\n');

      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      const url = URL.createObjectURL(blob);
      link.setAttribute('href', url);
      link.setAttribute('download', 'url_status_results.csv');
      link.style.visibility = 'hidden';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    document.getElementById('checkBtn').addEventListener('click', checkUrls);
  </script>
</body>
</html>
