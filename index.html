<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URL Status Checker</title>
  <style>
    :root {
      --pink-soft: #ffd6e7;
      --pink-medium: #ff85b3;
      --pink-dark: #e75480;
      --text-dark: #5a3a4a;
      --text-light: #fff;
      --shadow: rgba(0, 0, 0, 0.05);
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 20px;
      background: linear-gradient(135deg, #ffe6f2 0%, #ffcce6 100%);
      color: var(--text-dark);
      min-height: 100vh;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 30px;
    }

    h1 {
      font-size: 2.5rem;
      color: var(--pink-dark);
      margin: 0;
      text-shadow: 1px 1px 2px var(--shadow);
    }

    .subtitle {
      font-size: 1.1rem;
      color: var(--pink-medium);
      margin-top: 5px;
    }

    textarea {
      width: 100%;
      height: 120px;
      padding: 12px;
      border: 1px solid rgba(255, 133, 179, 0.3);
      border-radius: 8px;
      font-family: inherit;
      font-size: 1rem;
      background: rgba(255, 255, 255, 0.8);
      resize: vertical;
    }

    textarea:focus {
      outline: none;
      border-color: var(--pink-medium);
      box-shadow: 0 0 0 2px rgba(255, 133, 179, 0.2);
    }

    button {
      margin: 10px 0;
      padding: 10px 20px;
      background: var(--pink-medium);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    button:hover:not(:disabled) {
      background: var(--pink-dark);
      transform: translateY(-1px);
    }

    button:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
    }

    .summary {
      background: rgba(255, 255, 255, 0.8);
      padding: 15px 20px;
      border-radius: 12px;
      margin: 20px 0;
      text-align: center;
      font-size: 1.1rem;
      color: var(--pink-dark);
      box-shadow: 0 2px 8px var(--shadow);
      border: 1px solid rgba(255, 133, 179, 0.2);
    }

    .table-wrapper {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 12px var(--shadow);
      border: 1px solid rgba(255, 133, 179, 0.2);
      margin-top: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      background: var(--pink-soft);
      color: var(--pink-dark);
      padding: 16px 12px;
      text-align: left;
      font-weight: 600;
      border-bottom: 2px solid var(--pink-medium);
    }

    td {
      padding: 14px 12px;
      border-bottom: 1px solid rgba(255, 133, 179, 0.2);
    }

    tr:last-child td {
      border-bottom: none;
    }

    tr:hover {
      background: rgba(255, 214, 231, 0.3);
    }

    .status-active {
      color: #4caf50;
      font-weight: 600;
    }

    .status-non-active {
      color: #f44336;
      font-weight: 600;
    }

    .redirect-url {
      font-size: 0.85em;
      color: var(--pink-medium);
      margin-top: 2px;
    }

    a {
      color: var(--pink-dark);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .loading {
      opacity: 0.7;
      pointer-events: none;
    }

    .pulse {
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.6; }
      100% { opacity: 1; }
    }

    footer {
      text-align: center;
      margin-top: 30px;
      font-size: 0.9rem;
      color: var(--pink-medium);
    }

    /* Progress bar styles */
    .progress-container {
      width: 100%;
      background: rgba(255, 255, 255, 0.8);
      border-radius: 8px;
      margin: 10px 0;
      overflow: hidden;
      height: 8px;
    }

    .progress-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, var(--pink-soft), var(--pink-medium));
      border-radius: 8px;
      transition: width 0.3s ease;
    }

    .status-message {
      font-size: 0.9rem;
      color: var(--pink-medium);
      margin-top: 5px;
    }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin: 10px 0;
    }

    .controls button {
      margin: 0;
    }

    .delay-control {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255, 255, 255, 0.8);
      padding: 8px 15px;
      border-radius: 8px;
      border: 1px solid rgba(255, 133, 179, 0.2);
    }

    .delay-control label {
      font-size: 0.9rem;
      color: var(--text-dark);
    }

    .delay-control input {
      width: 80px;
      padding: 4px 8px;
      border: 1px solid rgba(255, 133, 179, 0.3);
      border-radius: 4px;
      font-size: 0.9rem;
    }

    .delay-control input:focus {
      outline: none;
      border-color: var(--pink-medium);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>URL Status Checker</h1>
      <div class="subtitle">Enter URLs (one per line) to check if they're active or non‑active 💖</div>
    </header>

    <textarea id="urlsInput" placeholder="http://example.com
https://another.example"></textarea><br>

    <div class="controls">
      <button id="checkBtn">Check URLs</button>
      <div class="delay-control">
        <label for="delayInput">Delay (ms):</label>
        <input type="number" id="delayInput" value="200" min="50" max="5000">
      </div>
    </div>

    <div class="summary" id="summary"></div>
    <div class="progress-container">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="status-message" id="statusMessage"></div>

    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>URL</th>
            <th>Status</th>
            <th>Details</th>
          </tr>
        </thead>
        <tbody id="results">
          <!-- Results will be inserted here -->
        </tbody>
      </table>
    </div>

    <button id="exportBtn" style="display:none;">Download Results as CSV</button>
    <button id="continueBtn" style="display:none;">Continue to Page 2</button>

    <footer>
      Created by Mitra 🐤
    </footer>
  </div>

  <script>
    const proxyUrl = 'https://corsproxy.io/?';
    const timeoutMs = 10000;

    // Check a single URL with retry logic
    async function checkUrlWithRetry(url, maxRetries = 3) {
      let lastError;
      
      for (let attempt = 0; attempt < maxRetries; attempt++) {
        try {
          // If this is a retry, wait longer
          if (attempt > 0) {
            const waitTime = 2000 * Math.pow(2, attempt - 1);
            await new Promise(resolve => setTimeout(resolve, waitTime));
          }
          
          const result = await checkUrl(url);
          
          // If we got a rate limit response, throw to trigger retry
          if (result.statusInfo.includes('429')) {
            throw new Error('Rate limited (429)');
          }
          
          return result;
        } catch (error) {
          lastError = error;
          
          // If it's a rate limit or abort error, we'll retry
          if (error.message.includes('429') || error.message.includes('aborted')) {
            continue;
          }
          
          // For other errors, return non-active
          return {
            url,
            statusLabel: 'Non-active',
            statusInfo: error.message,
            ok: false
          };
        }
      }
      
      // All retries failed
      return {
        url,
        statusLabel: 'Non-active',
        statusInfo: lastError?.message || 'Failed after retries',
        ok: false
      };
    }

    // Check a single URL
    async function checkUrl(url) {
      const proxyFullUrl = proxyUrl + encodeURIComponent(url);

      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), timeoutMs);

      try {
        const response = await fetch(proxyFullUrl, {
          signal: controller.signal,
          redirect: 'follow'
        });
        clearTimeout(timeoutId);

        if (response.ok) {
          const finalUrl = response.url;
          let statusLabel = 'Active';
          let statusInfo = 'HTTP ' + response.status;

          // Show redirect info but keep status as Active
          if (finalUrl && finalUrl !== url) {
            statusInfo += ' | Redirected';
          }

          return {
            url,
            finalUrl,
            statusLabel,
            statusInfo,
            ok: true
          };
        } else {
          return {
            url,
            statusLabel: 'Non-active',
            statusInfo: 'HTTP ' + response.status,
            ok: false
          };
        }
      } catch (error) {
        clearTimeout(timeoutId);
        return {
          url,
          statusLabel: 'Non-active',
          statusInfo: error.message,
          ok: false
        };
      }
    }

    // Check all URLs with delay between requests
    async function checkUrls() {
      const urlsInput = document.getElementById('urlsInput').value.trim();
      if (!urlsInput) return;

      const urls = urlsInput.split('\n').map(s => s.trim()).filter(Boolean);
      const resultsElem = document.getElementById('results');
      const summaryElem = document.getElementById('summary');
      const progressBar = document.getElementById('progressBar');
      const statusMessage = document.getElementById('statusMessage');
      const checkBtn = document.getElementById('checkBtn');
      const exportBtn = document.getElementById('exportBtn');
      const continueBtn = document.getElementById('continueBtn');
      const delayInput = document.getElementById('delayInput');

      // Get delay value
      const delayMs = parseInt(delayInput.value) || 200;

      resultsElem.innerHTML = '';
      summaryElem.textContent = 'Checking URLs...';
      progressBar.style.width = '0%';
      statusMessage.textContent = 'Starting...';
      checkBtn.disabled = true;
      exportBtn.style.display = 'none';
      continueBtn.style.display = 'none';
      document.body.classList.add('loading');
      summaryElem.classList.add('pulse');

      const results = [];
      const total = urls.length;
      
      // Use batch processing with delays
      const batchSize = 10; // Process 10 URLs at a time
      
      for (let i = 0; i < total; i += batchSize) {
        const batch = urls.slice(i, Math.min(i + batchSize, total));
        const batchPromises = batch.map(async (url, index) => {
          // Stagger requests within the batch
          const staggerDelay = index * 50; // 50ms stagger within batch
          await new Promise(resolve => setTimeout(resolve, staggerDelay));
          
          const result = await checkUrlWithRetry(url);
          results.push(result);
          
          // Update progress
          const done = results.length;
          const percentage = Math.round((done / total) * 100);
          progressBar.style.width = percentage + '%';
          summaryElem.textContent = `${done}/${total} done`;
          statusMessage.textContent = `Checking: ${url.substring(0, 50)}${url.length > 50 ? '...' : ''}`;
          
          // Render results incrementally
          const resultRow = `
            <tr>
              <td>
                <a href="${result.url}" target="_blank">${result.url}</a>
                ${result.finalUrl && result.finalUrl !== result.url ? `<div class="redirect-url">→ ${result.finalUrl}</div>` : ''}
              </td>
              <td class="status-${result.statusLabel.toLowerCase().replace('/', '-')}">${result.statusLabel}</td>
              <td>${result.statusInfo}</td>
            </tr>
          `;
          resultsElem.insertAdjacentHTML('beforeend', resultRow);
        });
        
        // Wait for the current batch to complete
        await Promise.all(batchPromises);
        
        // Add a delay between batches (but not after the last batch)
        if (i + batchSize < total) {
          await new Promise(resolve => setTimeout(resolve, delayMs));
        }
      }

      // All done
      summaryElem.textContent = `${total}/${total} done`;
      progressBar.style.width = '100%';
      statusMessage.textContent = '✅ Complete! All URLs checked.';

      // Enable CSV export and continue button
      exportBtn.style.display = 'inline-block';
      exportBtn.onclick = () => exportToCsv(results);

      continueBtn.style.display = 'inline-block';
      continueBtn.onclick = () => continueToPage2(results);

      checkBtn.disabled = false;
      document.body.classList.remove('loading');
      summaryElem.classList.remove('pulse');
    }

    // Export results as CSV
    function exportToCsv(results) {
      const headers = ['URL', 'Status', 'Details'];
      const csvContent = [
        headers.join(','),
        ...results.map(r => [
          `"${r.url.replace(/"/g, '""')}"`,
          `"${r.statusLabel}"`,
          `"${r.statusInfo ? r.statusInfo.replace(/"/g, '""') : ''}"`
        ].join(','))
      ].join('\n');

      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      const url = URL.createObjectURL(blob);
      link.setAttribute('href', url);
      link.setAttribute('download', 'url_status_results.csv');
      link.style.visibility = 'hidden';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    // Continue to Page 2
    function continueToPage2(results) {
      const headers = ['URL', 'Status', 'Details'];
      const csvContent = [
        headers.join(','),
        ...results.map(r => [
          `"${r.url.replace(/"/g, '""')}"`,
          `"${r.statusLabel}"`,
          `"${r.statusInfo ? r.statusInfo.replace(/"/g, '""') : ''}"`
        ].join(','))
      ].join('\n');

      // Store CSV in localStorage for Page 2 to read
      localStorage.setItem('urlStatusResults', csvContent);

      // Redirect to Page 2
      window.location.href = 'page2.html';
    }

    // Event listeners
    document.getElementById('checkBtn').addEventListener('click', checkUrls);
    
    // Enter key support for textarea (Ctrl+Enter to check)
    document.getElementById('urlsInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
        e.preventDefault();
        document.getElementById('checkBtn').click();
      }
    });
  </script>
</body>
</html>
